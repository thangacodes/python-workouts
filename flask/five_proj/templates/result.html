<!DOCTYPE html>
<html>
<head>
    <title>Submitted Data</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">Submitted User Details</h2>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-bordered table-striped table-hover text-center">

                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Place</th>
                        <th>State</th>
                        <th>Pincode</th>
                    </tr>
                </thead>

                <tbody>
                {% for user in users %}
                    <tr>
                        <td>{{ user.name }}</td>
                        <td>{{ user.age }}</td>
                        <td>{{ user.place }}</td>
                        <td>{{ user.state }}</td>
                        <td>{{ user.pincode }}</td>
                    </tr>
                {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
